version = 1

[*]
host = 127.0.0.1
port = 8080

load-on-startup = false
stop-timeout = 30

jinja = true
reasoning = on
parallel = 1
n-gpu-layers = all
flash-attn = on
batch-size = 4096
ubatch-size = 1024
cache-ram = 65536
ctx-checkpoints = 64
repeat-penalty = 1.0
presence-penalty = 0.0

[example-model]
model = D:\models\example-model.gguf
ctx-size = 32768
cache-type-k = q8_0
cache-type-v = q8_0
temp = 0.6
top-p = 0.95
top-k = 20
